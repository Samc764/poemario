<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Poemario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section class="login-page">
        <div class="login-card">
            <h1>Registrarse</h1>
            <div class="auth-forms">
                <form id="registerForm" class="auth-form">
                    <label>Usuario<input type="text" id="registerUsername" required></label>
                    <label>Contraseña<input type="password" id="registerPassword" required></label>
                    <button type="submit">Crear cuenta</button>
                </form>
            </div>
            <div class="auth-footer">
                <a href="index.html" class="link-button">Volver al inicio de sesión</a>
            </div>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
