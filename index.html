<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Poemario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section class="login-page">
        <div class="login-card">
            <h1>Bienvenido a Poemario</h1>
            <p>Inicia sesión o crea una cuenta para guardar y explorar poemas e imágenes.</p>

            <div class="auth-forms">
                <form id="loginForm" class="auth-form">
                    <h3>Iniciar sesión</h3>
                    <label>Usuario o email<input type="text" id="loginUsername" required></label>
                    <label>Contraseña<input type="password" id="loginPassword" required></label>
                    <button type="submit">Entrar</button>
                </form>

                <form id="registerForm" class="auth-form">
                    <h3>Registrarse</h3>
                    <label>Usuario<input type="text" id="registerUsername" required></label>
                    <label>Email<input type="email" id="registerEmail" required></label>
                    <label>Contraseña<input type="password" id="registerPassword" required></label>
                    <button type="submit">Crear cuenta</button>
                </form>
            </div>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
