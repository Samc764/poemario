<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base" content="https://web-production-b33330.up.railway.app/api">
    <title>Iniciar sesión - Poemario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section class="login-page">
        <div class="login-card">
            <h1>Poemario</h1>
            <form id="loginForm" class="auth-form">
                <label>Usuario<input type="text" id="loginUsername" required></label>
                <label>Contraseña<input type="password" id="loginPassword" required></label>
                <button type="submit">Entrar</button>
            </form>
            <div class="auth-footer">
                <a href="register.html" class="link-button">Registrarse</a>
            </div>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
